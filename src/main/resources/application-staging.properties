## Database settings ##
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?sslMode=preferred&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

## Logging settings ##
#logging.level.root=INFO default
logging.level.gr.aueb.cf.schoolapp=INFO
logging.level.org.hibernate.SQL=INFO
spring.jpa.properties.hibernate.format_sql=true

#spring.thymeleaf.cache=true default is true, but for dev we set it to false
