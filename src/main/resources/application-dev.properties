spring.config.import=optional:file:.env[.properties]

## Database settings ##
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?sslMode=preferred&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

## Logging settings ##
#logging.level.root=INFO default
logging.level.gr.aueb.cf.schoolapp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.properties.hibernate.format_sql=true

# for production, you may want JSON
#logging.structured.format.console=ecs  ή logstash ή gelf

# rolling policy for log files (10MB max size, 7 days retention)
logging.file.name=logs/schoolapp.log

# disable cache for local development
spring.thymeleaf.cache=false
